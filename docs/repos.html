<body style="padding-top: 3.5rem">
<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <img src="img/transparent_spacer.png" width="50" height="32"><img src="img/logo.svg" width="135" height="32">
</nav>

<main role="main">

    <!-- Main jumbotron for a primary marketing message or call to action -->
    <div class="jumbotron">
        <div class="container">
            <h1 class="display-3">OAuthorizeMe</h1>
            <p class="lead">A very simple web app to work with OAuth2 framework</p>
            <p id="the_response"></p>
            <div class="container" id="accessToken" style="display:none">
                <p>ACCESS TOKEN:</p>
                <input id="accessTokenInput" type="text" class="form-control" placeholder="Access Token" aria-label="Access Token" aria-describedby="basic-addon2">
                <br>
                <button id="reposButton" type="button" class="btn btn-primary">Repos</button>
            </div>
            <br><br>
            <div class="alert alert-danger" id="formNotComplete" role="alert" style="display:none;"></div>
            <br><br>
        </div>
    </div>


</main>

<footer class="container">
    <hr>
    <p>&copy; Red Hat Italy 2026-2028</p>
</footer>

<!-- JavaScript libraries-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="js/jquery-3.7.1.min.js"></script>
<script src="js/mrt.js"></script>
<!-- jsPDF library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.debug.js" integrity="sha384-NaWTHo/8YCBYJ59830LTz/P4aQZK1sS0SneOgAvhsIl3zBu8r9RevNg5lHCHAuQ/" crossorigin="anonymous"></script>


<script type="text/javascript">

        $(document).ready(function () {

            const urlParams = new URLSearchParams(window.location.search);
  
            if(urlParams.has('accessToken')){
                console.log('!!!!!!=================> ' + urlParams.get('accessToken'));
            }

            $('#reposButton').click(function(){

                if ($('#clientIdInput').val().length == 0) {
                    setAlert('Please insert a valid CLIENT ID');
                    return;
                }
                localStorage.setItem('clientId', $('#clientIdInput').val());

                $("#loginForm").hide(500);

                const state = window.crypto.randomUUID();
                localStorage.setItem('state', state);

                const params = new URLSearchParams();
                params.set("state", state);
                params.set("response_type", "code");
                params.set("redirect_uri", window.location.origin + window.location.pathname);
                params.set("scope", "user public_repo");
                params.set("client_id", $('#clientIdInput').val());

                console.log("go to login: " + AUTH_URL + '?' + params.toString());
                window.open(AUTH_URL + '?' + params.toString(), "_self");
            });

        });

    </script>

</body>
